<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Mods Hub</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; }
        header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card { background: white; width: 300px; margin: 15px; padding: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card img { width: 100%; border-radius: 5px; }
        .btn { display: block; background: #27ae60; color: white; text-align: center; padding: 10px; margin-top: 10px; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <header><h1>مكتبة مودات ماين كرافت</h1></header>
    <div class="container">
        <div class="card">
            <img src="https://static.wikia.nocookie.net/minecraft/images/3/30/Minecraft_Diamond_Ore.png" alt="Mod">
            <h3>مود الموارد النادرة</h3>
            <p>هذا المود يضيف موارد جديدة وقوية للعالم.</p>
            <a href="#" class="btn">تحميل المود</a>
        </div>
    </div>
</body>
</html>
